<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1284 2778">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
  </defs>
  <!-- Full screen background -->
  <rect width="1284" height="2778" fill="url(#bg)"/>
  <!-- Ballot slot -->
  <rect x="442" y="1050" width="400" height="60" rx="30" fill="#bbf7d0" opacity="0.4"/>
  <!-- Ballot box -->
  <rect x="342" y="1130" width="600" height="480" rx="60" fill="#166534"/>
  <!-- Checkmark -->
  <polyline points="470,1370 570,1470 814,1210" fill="none" stroke="#ffffff" stroke-width="80" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Brand -->
  <text x="642" y="1780" font-family="Arial, sans-serif" font-size="120" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="4">myVote</text>
  <text x="642" y="1860" font-family="Arial, sans-serif" font-size="50" font-weight="400" fill="#bbf7d0" text-anchor="middle" letter-spacing="10">KENYA</text>
  <!-- Kenyan flag accent -->
  <line x1="442" y1="1900" x2="542" y2="1900" stroke="#000000" stroke-width="4"/>
  <line x1="542" y1="1900" x2="642" y2="1900" stroke="#dc2626" stroke-width="4"/>
  <line x1="642" y1="1900" x2="742" y2="1900" stroke="#16a34a" stroke-width="4"/>
  <line x1="742" y1="1900" x2="842" y2="1900" stroke="#000000" stroke-width="4"/>
</svg>
