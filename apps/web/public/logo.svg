<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
  </defs>
  <!-- Ballot box icon -->
  <rect x="10" y="25" width="60" height="55" rx="6" fill="url(#brandGrad)"/>
  <rect x="22" y="18" width="36" height="14" rx="3" fill="#166534"/>
  <!-- Ballot slot -->
  <rect x="28" y="22" width="24" height="4" rx="2" fill="#bbf7d0"/>
  <!-- Checkmark on box -->
  <polyline points="25,52 35,62 55,38" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- "my" text -->
  <text x="85" y="68" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="300" fill="#374151" letter-spacing="-1">my</text>
  <!-- "Vote" text -->
  <text x="152" y="68" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="800" fill="url(#brandGrad)" letter-spacing="-1">Vote</text>
  <!-- "Kenya" subtitle -->
  <text x="265" y="68" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="500" fill="#9ca3af" letter-spacing="2">KENYA</text>
  <!-- Kenyan flag accent line -->
  <line x1="85" y1="76" x2="365" y2="76" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="85" y1="76" x2="155" y2="76" stroke="#000000" stroke-width="2"/>
  <line x1="155" y1="76" x2="225" y2="76" stroke="#dc2626" stroke-width="2"/>
  <line x1="225" y1="76" x2="295" y2="76" stroke="#16a34a" stroke-width="2"/>
  <line x1="295" y1="76" x2="365" y2="76" stroke="#000000" stroke-width="2"/>
</svg>
