<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Ballot slot -->
  <rect x="18" y="10" width="28" height="5" rx="2.5" fill="#bbf7d0" opacity="0.6"/>
  <!-- Ballot box body -->
  <rect x="12" y="16" width="40" height="38" rx="5" fill="#166534"/>
  <!-- Checkmark -->
  <polyline points="20,36 28,44 44,24" fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- "mV" text at bottom -->
  <text x="32" y="60" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#bbf7d0" text-anchor="middle" letter-spacing="0.5">myVote</text>
</svg>
