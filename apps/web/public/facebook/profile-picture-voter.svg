<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <!-- Background gradient: Kenyan sky/sunset feel -->
    <radialGradient id="bgRad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </radialGradient>
    
    <!-- Person silhouette gradient -->
    <linearGradient id="personGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#451A03;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ballot box gradient -->
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5E7EB;stop-opacity:1" />
    </linearGradient>
    
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="500" cy="500" r="500" fill="url(#bgRad)"/>
  
  <!-- Ground/floor line -->
  <ellipse cx="500" cy="850" rx="350" ry="30" fill="#000000" opacity="0.3"/>

  <!-- Kenyan flag colors as ring accents -->
  <g opacity="0.6">
    <circle cx="500" cy="500" r="490" fill="none" stroke="#000000" stroke-width="3"/>
    <circle cx="500" cy="500" r="483" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="500" cy="500" r="478" fill="none" stroke="#DC2626" stroke-width="3"/>
    <circle cx="500" cy="500" r="471" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="500" cy="500" r="466" fill="none" stroke="#059669" stroke-width="3"/>
  </g>

  <!-- Ballot Box -->
  <g transform="translate(620, 600)" filter="url(#softShadow)">
    <!-- Box body -->
    <rect x="-100" y="0" width="200" height="180" rx="10" fill="url(#boxGrad)"/>
    <rect x="-100" y="0" width="200" height="180" rx="10" fill="none" stroke="#1E40AF" stroke-width="3"/>
    <!-- Box lid -->
    <rect x="-110" y="-25" width="220" height="35" rx="6" fill="#FFFFFF" stroke="#1E40AF" stroke-width="3"/>
    <!-- Slot -->
    <rect x="-50" y="-15" width="100" height="10" rx="3" fill="#1E40AF"/>
    
    <!-- "VOTE" label on box -->
    <text x="0" y="100" text-anchor="middle" fill="#1E40AF" font-family="Arial" font-size="36" font-weight="900" letter-spacing="3">VOTE</text>
    <!-- Kenya flag on box -->
    <g transform="translate(0, 130)">
      <rect x="-30" y="0" width="60" height="4" fill="#000000"/>
      <rect x="-30" y="5" width="60" height="4" fill="#DC2626"/>
      <rect x="-30" y="10" width="60" height="4" fill="#059669"/>
    </g>
  </g>

  <!-- Person Silhouette (Voting) -->
  <g transform="translate(420, 380)" filter="url(#softShadow)">
    <!-- Head -->
    <circle cx="0" cy="0" r="55" fill="url(#personGrad)"/>
    <!-- Hair (afro style) -->
    <path d="M -55 -10 
             Q -65 -50, -45 -65 
             Q -25 -85, 0 -80
             Q 25 -85, 45 -65
             Q 65 -50, 55 -10
             Q 50 -25, 35 -30
             Q 0 -40, -35 -30
             Q -50 -25, -55 -10 Z" 
          fill="#1F2937"/>
    
    <!-- Neck -->
    <rect x="-15" y="40" width="30" height="35" fill="url(#personGrad)"/>
    
    <!-- Body/Shirt -->
    <path d="M -80 75 
             Q -90 90, -90 110
             L -100 280
             L 100 280
             L 90 110
             Q 90 90, 80 75
             L 30 70
             Q 0 80, -30 70 Z" 
          fill="#1E40AF"/>
    
    <!-- Shirt collar -->
    <path d="M -25 70 L 0 95 L 25 70 L 15 75 Q 0 82, -15 75 Z" fill="#1E3A8A"/>
    
    <!-- Right arm reaching out with ballot -->
    <path d="M 75 110 
             Q 130 100, 180 130
             Q 200 145, 195 165
             Q 190 175, 170 175
             Q 150 165, 130 155
             L 90 145 Z" 
          fill="url(#personGrad)"/>
    
    <!-- Hand -->
    <ellipse cx="195" cy="170" rx="20" ry="18" fill="url(#personGrad)"/>
    
    <!-- Ballot paper in hand -->
    <g transform="translate(180, 145) rotate(15)">
      <rect x="-25" y="-35" width="50" height="60" fill="#FFFFFF" stroke="#1E40AF" stroke-width="2" rx="2"/>
      <!-- Lines on ballot -->
      <line x1="-18" y1="-25" x2="18" y2="-25" stroke="#9CA3AF" stroke-width="1.5"/>
      <line x1="-18" y1="-15" x2="12" y2="-15" stroke="#9CA3AF" stroke-width="1.5"/>
      <line x1="-18" y1="-5" x2="18" y2="-5" stroke="#9CA3AF" stroke-width="1.5"/>
      <!-- Checkmark on ballot -->
      <circle cx="0" cy="10" r="10" fill="none" stroke="#059669" stroke-width="2"/>
      <path d="M -5 10 L -1 14 L 6 6" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Left arm down at side -->
    <path d="M -80 110 
             Q -95 130, -95 180
             Q -90 220, -80 250
             L -60 245
             Q -65 215, -65 180
             Q -65 150, -55 130 Z" 
          fill="url(#personGrad)"/>
  </g>

  <!-- Title text -->
  <text x="500" y="930" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="900" letter-spacing="-1">myVote Kenya</text>
  <text x="500" y="970" text-anchor="middle" fill="#059669" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" letter-spacing="3">EVERY VOTE COUNTS</text>
</svg>
