<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 624" width="1640" height="624">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    
    <!-- Map gradient -->
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.1" />
    </linearGradient>
    
    <!-- Phone screen gradient -->
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F3F4F6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pattern for background dots -->
    <pattern id="dotPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#FFFFFF" opacity="0.1"/>
    </pattern>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1640" height="624" fill="url(#bgGrad)"/>
  <rect width="1640" height="624" fill="url(#dotPattern)"/>
  
  <!-- Decorative diagonal stripes (Kenyan flag inspired) -->
  <g opacity="0.08">
    <polygon points="0,624 200,624 400,0 200,0" fill="#059669"/>
    <polygon points="200,624 400,624 600,0 400,0" fill="#DC2626"/>
    <polygon points="1240,0 1440,0 1640,624 1440,624" fill="#059669"/>
    <polygon points="1440,0 1640,0 1640,200 1440,200" fill="#DC2626"/>
  </g>

  <!-- LEFT SIDE: Phone mockup showing app -->
  <g transform="translate(200, 110)" filter="url(#dropShadow)">
    <!-- Phone outer frame -->
    <rect x="0" y="0" width="220" height="400" rx="30" fill="#1F2937"/>
    <!-- Phone screen -->
    <rect x="10" y="40" width="200" height="340" rx="5" fill="url(#phoneGrad)"/>
    <!-- Notch -->
    <rect x="85" y="15" width="50" height="12" rx="6" fill="#000"/>
    
    <!-- Screen content: header -->
    <rect x="10" y="40" width="200" height="50" fill="#1E40AF"/>
    <text x="110" y="72" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="700">myVote Kenya</text>
    
    <!-- Screen content: cards -->
    <rect x="25" y="105" width="170" height="60" rx="8" fill="#F3F4F6"/>
    <circle cx="50" cy="135" r="15" fill="#1E40AF"/>
    <text x="50" y="140" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="700">👤</text>
    <rect x="75" y="120" width="100" height="8" rx="2" fill="#1F2937"/>
    <rect x="75" y="135" width="80" height="6" rx="2" fill="#9CA3AF"/>
    <rect x="75" y="148" width="60" height="6" rx="2" fill="#9CA3AF"/>
    
    <rect x="25" y="180" width="170" height="60" rx="8" fill="#F3F4F6"/>
    <circle cx="50" cy="210" r="15" fill="#059669"/>
    <text x="50" y="215" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="700">📊</text>
    <rect x="75" y="195" width="100" height="8" rx="2" fill="#1F2937"/>
    <rect x="75" y="210" width="80" height="6" rx="2" fill="#9CA3AF"/>
    <rect x="75" y="223" width="60" height="6" rx="2" fill="#9CA3AF"/>
    
    <rect x="25" y="255" width="170" height="60" rx="8" fill="#F3F4F6"/>
    <circle cx="50" cy="285" r="15" fill="#DC2626"/>
    <text x="50" y="290" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="700">🗳️</text>
    <rect x="75" y="270" width="100" height="8" rx="2" fill="#1F2937"/>
    <rect x="75" y="285" width="80" height="6" rx="2" fill="#9CA3AF"/>
    <rect x="75" y="298" width="60" height="6" rx="2" fill="#9CA3AF"/>
    
    <!-- Bottom nav -->
    <rect x="10" y="350" width="200" height="30" fill="#FFFFFF"/>
    <circle cx="50" cy="365" r="5" fill="#1E40AF"/>
    <circle cx="90" cy="365" r="5" fill="#9CA3AF"/>
    <circle cx="130" cy="365" r="5" fill="#9CA3AF"/>
    <circle cx="170" cy="365" r="5" fill="#9CA3AF"/>
  </g>

  <!-- CENTER: Main content -->
  <g transform="translate(820, 312)">
    <!-- Logo circle -->
    <g transform="translate(0, -180)">
      <circle cx="0" cy="0" r="45" fill="#FFFFFF" filter="url(#dropShadow)"/>
      <!-- Ballot icon -->
      <rect x="-22" y="-15" width="44" height="35" rx="4" fill="#1E40AF"/>
      <rect x="-15" y="-22" width="30" height="6" rx="2" fill="#FFFFFF"/>
      <path d="M -10 0 L -2 8 L 12 -8" fill="none" stroke="#059669" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Main heading -->
    <text x="0" y="-90" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="900" letter-spacing="-2">myVote Kenya</text>
    
    <!-- Tagline -->
    <text x="0" y="-40" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="400" opacity="0.95">Your Voice. Your Vote. Your Platform.</text>
    
    <!-- Decorative line -->
    <line x1="-150" y1="-15" x2="150" y2="-15" stroke="#059669" stroke-width="3"/>
    
    <!-- Stats row -->
    <g transform="translate(0, 30)">
      <text x="-220" y="0" text-anchor="middle" fill="#059669" font-family="Arial" font-size="36" font-weight="900">47</text>
      <text x="-220" y="25" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="500" opacity="0.9">COUNTIES</text>
      
      <text x="0" y="0" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="36" font-weight="900">290</text>
      <text x="0" y="25" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="500" opacity="0.9">CONSTITUENCIES</text>
      
      <text x="220" y="0" text-anchor="middle" fill="#DC2626" font-family="Arial" font-size="36" font-weight="900">46,229</text>
      <text x="220" y="25" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="500" opacity="0.9">POLLING STATIONS</text>
    </g>
    
    <!-- Platform badges -->
    <g transform="translate(0, 110)">
      <!-- Web -->
      <g transform="translate(-180, 0)">
        <rect x="-60" y="-18" width="120" height="36" rx="18" fill="#FFFFFF" opacity="0.15"/>
        <text x="0" y="6" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="600">🌐 WEB</text>
      </g>
      <!-- Mobile -->
      <g transform="translate(0, 0)">
        <rect x="-60" y="-18" width="120" height="36" rx="18" fill="#FFFFFF" opacity="0.15"/>
        <text x="0" y="6" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="600">📱 MOBILE</text>
      </g>
      <!-- USSD -->
      <g transform="translate(180, 0)">
        <rect x="-60" y="-18" width="120" height="36" rx="18" fill="#FFFFFF" opacity="0.15"/>
        <text x="0" y="6" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="600">📞 USSD</text>
      </g>
    </g>
    
    <!-- Website URL -->
    <text x="0" y="200" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="20" font-weight="700" opacity="0.9">www.myvote.ke  •  *384*VOTE#</text>
  </g>

  <!-- RIGHT SIDE: Kenya map silhouette -->
  <g transform="translate(1340, 312)" opacity="0.85" filter="url(#dropShadow)">
    <!-- Simplified Kenya map outline -->
    <path d="M -100 -150 
             L -50 -160 
             L 20 -155 
             L 80 -130 
             L 110 -100 
             L 120 -50 
             L 130 0 
             L 120 60 
             L 100 110 
             L 60 140 
             L 0 155 
             L -50 150 
             L -90 130 
             L -110 90 
             L -120 40 
             L -125 -10 
             L -120 -60 
             L -110 -110 
             Z" 
          fill="url(#mapGrad)" 
          stroke="#059669" 
          stroke-width="3"/>
    
    <!-- Pin markers on map (representing polling stations) -->
    <g fill="#DC2626">
      <circle cx="-30" cy="-80" r="6" filter="url(#glow)"/>
      <circle cx="30" cy="-40" r="6" filter="url(#glow)"/>
      <circle cx="-50" cy="20" r="6" filter="url(#glow)"/>
      <circle cx="60" cy="50" r="6" filter="url(#glow)"/>
      <circle cx="0" cy="100" r="6" filter="url(#glow)"/>
      <circle cx="-80" cy="-20" r="6" filter="url(#glow)"/>
      <circle cx="80" cy="-10" r="6" filter="url(#glow)"/>
    </g>
    
    <!-- KENYA label -->
    <text x="0" y="0" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="24" font-weight="900" letter-spacing="4">KENYA</text>
  </g>

  <!-- Bottom strip -->
  <rect x="0" y="595" width="1640" height="29" fill="#000000" opacity="0.4"/>
  <text x="820" y="615" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="500" opacity="0.8">EMPOWERING DEMOCRACY  •  CONNECTING VOTERS  •  TRANSPARENT ELECTIONS</text>
</svg>
