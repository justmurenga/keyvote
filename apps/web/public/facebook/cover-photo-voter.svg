<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 624" width="1640" height="624">
  <defs>
    <linearGradient id="bgGradC2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="personGradC2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#451A03;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="boxGradC2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5E7EB;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="dotsC2" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#FFFFFF" opacity="0.08"/>
    </pattern>
    
    <filter id="shadowC2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1640" height="624" fill="url(#bgGradC2)"/>
  <rect width="1640" height="624" fill="url(#dotsC2)"/>
  
  <!-- Kenyan flag stripe accent at top -->
  <g opacity="0.9">
    <rect x="0" y="0" width="1640" height="6" fill="#000000"/>
    <rect x="0" y="6" width="1640" height="6" fill="#DC2626"/>
    <rect x="0" y="12" width="1640" height="6" fill="#059669"/>
  </g>
  
  <!-- Bottom flag stripe -->
  <g opacity="0.9">
    <rect x="0" y="606" width="1640" height="6" fill="#059669"/>
    <rect x="0" y="612" width="1640" height="6" fill="#DC2626"/>
    <rect x="0" y="618" width="1640" height="6" fill="#000000"/>
  </g>

  <!-- Decorative diagonal accent on right -->
  <polygon points="1100,30 1640,30 1640,594 1300,594" fill="#1E40AF" opacity="0.3"/>
  <polygon points="1200,30 1640,30 1640,594 1400,594" fill="#059669" opacity="0.15"/>

  <!-- LEFT SIDE: Text content -->
  <g transform="translate(80, 312)">
    <!-- Small badge -->
    <g transform="translate(0, -180)">
      <rect x="0" y="0" width="200" height="32" rx="16" fill="#059669"/>
      <text x="100" y="22" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="700" letter-spacing="2">🇰🇪 KENYA 2027</text>
    </g>
    
    <!-- Main heading -->
    <text x="0" y="-100" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" letter-spacing="-2">Your Voice.</text>
    <text x="0" y="-30" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" letter-spacing="-2">Your Vote.</text>
    <text x="0" y="40" fill="#059669" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" letter-spacing="-2">Your Power.</text>
    
    <!-- Tagline -->
    <text x="0" y="90" fill="#FFFFFF" font-family="Arial" font-size="22" font-weight="400" opacity="0.9">Kenya's premier election management platform</text>
    
    <!-- Decorative line -->
    <line x1="0" y1="115" x2="200" y2="115" stroke="#DC2626" stroke-width="4"/>
    
    <!-- Platform access -->
    <g transform="translate(0, 145)">
      <text x="0" y="0" fill="#FFFFFF" font-family="Arial" font-size="18" font-weight="700">Available on:</text>
      
      <g transform="translate(0, 25)">
        <rect x="0" y="0" width="110" height="34" rx="17" fill="#FFFFFF" opacity="0.15"/>
        <text x="55" y="22" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="600">🌐 Web</text>
      </g>
      
      <g transform="translate(120, 25)">
        <rect x="0" y="0" width="110" height="34" rx="17" fill="#FFFFFF" opacity="0.15"/>
        <text x="55" y="22" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="600">📱 Mobile</text>
      </g>
      
      <g transform="translate(240, 25)">
        <rect x="0" y="0" width="110" height="34" rx="17" fill="#FFFFFF" opacity="0.15"/>
        <text x="55" y="22" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="600">📞 USSD</text>
      </g>
    </g>
    
    <!-- URL -->
    <text x="0" y="225" fill="#FFFFFF" font-family="Arial" font-size="20" font-weight="700">www.myvote.ke</text>
  </g>

  <!-- CENTER: Person voting illustration -->
  <g transform="translate(900, 320)" filter="url(#shadowC2)">
    <!-- Ground shadow -->
    <ellipse cx="0" cy="240" rx="180" ry="15" fill="#000000" opacity="0.4"/>
    
    <!-- Ballot Box -->
    <g transform="translate(80, 100)">
      <!-- Box body -->
      <rect x="-70" y="0" width="140" height="130" rx="6" fill="url(#boxGradC2)"/>
      <rect x="-70" y="0" width="140" height="130" rx="6" fill="none" stroke="#1E40AF" stroke-width="2"/>
      <!-- Box top -->
      <rect x="-78" y="-18" width="156" height="25" rx="4" fill="#FFFFFF" stroke="#1E40AF" stroke-width="2"/>
      <!-- Slot -->
      <rect x="-35" y="-10" width="70" height="7" rx="2" fill="#1E40AF"/>
      <!-- VOTE label -->
      <text x="0" y="80" text-anchor="middle" fill="#1E40AF" font-family="Arial" font-size="26" font-weight="900" letter-spacing="2">VOTE</text>
      <!-- Kenya flag mini -->
      <g transform="translate(0, 100)">
        <rect x="-22" y="0" width="44" height="3" fill="#000000"/>
        <rect x="-22" y="4" width="44" height="3" fill="#DC2626"/>
        <rect x="-22" y="8" width="44" height="3" fill="#059669"/>
      </g>
    </g>
    
    <!-- Person -->
    <g transform="translate(-100, 0)">
      <!-- Head -->
      <circle cx="0" cy="-90" r="42" fill="url(#personGradC2)"/>
      <!-- Hair -->
      <path d="M -42 -100 
               Q -50 -135, -32 -148 
               Q -15 -165, 0 -163
               Q 18 -165, 32 -148
               Q 50 -135, 42 -100
               Q 38 -110, 25 -114
               Q 0 -122, -25 -114
               Q -38 -110, -42 -100 Z" 
            fill="#1F2937"/>
      
      <!-- Neck -->
      <rect x="-12" y="-55" width="24" height="28" fill="url(#personGradC2)"/>
      
      <!-- Body/Shirt -->
      <path d="M -60 -27 
               Q -68 -15, -68 0
               L -75 200
               L 75 200
               L 68 0
               Q 68 -15, 60 -27
               L 22 -32
               Q 0 -22, -22 -32 Z" 
            fill="#DC2626"/>
      
      <!-- Shirt collar -->
      <path d="M -20 -32 L 0 -10 L 20 -32 L 12 -28 Q 0 -22, -12 -28 Z" fill="#991B1B"/>
      
      <!-- Right arm extending toward ballot box with paper -->
      <path d="M 58 0 
               Q 110 -5, 155 15
               Q 175 25, 170 40
               Q 165 50, 145 50
               Q 125 42, 105 35
               L 70 25 Z" 
            fill="url(#personGradC2)"/>
      
      <!-- Hand -->
      <ellipse cx="170" cy="42" rx="18" ry="16" fill="url(#personGradC2)"/>
      
      <!-- Ballot paper being inserted -->
      <g transform="translate(170, 25) rotate(20)">
        <rect x="-22" y="-32" width="44" height="55" fill="#FFFFFF" stroke="#1E40AF" stroke-width="2" rx="2"/>
        <line x1="-15" y1="-22" x2="15" y2="-22" stroke="#9CA3AF" stroke-width="1.5"/>
        <line x1="-15" y1="-12" x2="10" y2="-12" stroke="#9CA3AF" stroke-width="1.5"/>
        <line x1="-15" y1="-2" x2="15" y2="-2" stroke="#9CA3AF" stroke-width="1.5"/>
        <!-- Checkmark -->
        <circle cx="0" cy="10" r="9" fill="none" stroke="#059669" stroke-width="2"/>
        <path d="M -4 10 L -1 13 L 5 6" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      
      <!-- Left arm -->
      <path d="M -60 0 
               Q -75 20, -75 70
               Q -70 110, -60 140
               L -42 135
               Q -47 105, -47 70
               Q -47 40, -38 20 Z" 
            fill="url(#personGradC2)"/>
    </g>
    
    <!-- Speech bubble / Sparkle effects -->
    <g opacity="0.9">
      <text x="-120" y="-150" font-size="24" fill="#FBBF24">✨</text>
      <text x="50" y="-180" font-size="20" fill="#FBBF24">⭐</text>
      <text x="180" y="-100" font-size="22" fill="#FBBF24">✨</text>
    </g>
  </g>

  <!-- Bottom CTA strip -->
  <g transform="translate(820, 570)">
    <text x="0" y="0" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="600" letter-spacing="3" opacity="0.9">FOLLOW CANDIDATES  •  PARTICIPATE IN POLLS  •  TRACK RESULTS  •  EMPOWER DEMOCRACY</text>
  </g>
</svg>
