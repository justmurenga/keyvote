# Digital Ocean App Platform Specification
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# Deploy with:  doctl apps create --spec do-app-spec.yaml
# Update with:  doctl apps update <APP_ID> --spec do-app-spec.yaml
# Validate:     doctl apps spec validate do-app-spec.yaml

name: myvote-kenya

region: fra

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

services:
  # ──────────────────────────────────────────
  # Web Application (Next.js Standalone)
  # ──────────────────────────────────────────
  - name: web
    github:
      repo: justmurenga/keyvote
      branch: main
      deploy_on_push: true
    dockerfile_path: apps/web/Dockerfile
    source_dir: /
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3000
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        type: SECRET
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        type: SECRET
      - key: NEXT_PUBLIC_APP_URL
        type: SECRET
      - key: NEXT_PUBLIC_APP_NAME
        value: "myVote Kenya"
      - key: AT_API_KEY
        type: SECRET
      - key: AT_USERNAME
        type: SECRET
      - key: AT_SENDER_ID
        value: MYVOTE
      - key: MPESA_CONSUMER_KEY
        type: SECRET
      - key: MPESA_CONSUMER_SECRET
        type: SECRET
      - key: MPESA_PASSKEY
        type: SECRET
      - key: MPESA_SHORTCODE
        type: SECRET
      - key: MPESA_ENVIRONMENT
        value: live
      - key: MPESA_CALLBACK_URL
        type: SECRET
      - key: SENTRY_DSN
        type: SECRET
      - key: NEXT_PUBLIC_POSTHOG_KEY
        type: SECRET
      - key: NEXT_PUBLIC_POSTHOG_HOST
        value: "https://app.posthog.com"
    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

  # ──────────────────────────────────────────
  # USSD Service (Express)
  # ──────────────────────────────────────────
  - name: ussd
    github:
      repo: justmurenga/keyvote
      branch: main
      deploy_on_push: true
    dockerfile_path: apps/ussd/Dockerfile
    source_dir: /
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3001
    routes:
      - path: /ussd
        preserve_path_prefix: true
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: AT_API_KEY
        type: SECRET
      - key: AT_USERNAME
        type: SECRET
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
