# Digital Ocean App Platform Specification
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: myvote-kenya

region: fra

services:
  # Web Application (Next.js)
  - name: web
    source_dir: /apps/web
    github:
      repo: your-org/myvote-kenya
      branch: main
      deploy_on_push: true
    build_command: cd ../.. && pnpm install && pnpm build --filter=@myvote/web
    run_command: cd apps/web && npm start
    environment_slug: node-js
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3000
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        type: SECRET
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        type: SECRET
    health_check:
      http_path: /api/health

  # USSD Service
  - name: ussd
    source_dir: /apps/ussd
    github:
      repo: your-org/myvote-kenya
      branch: main
      deploy_on_push: true
    build_command: cd ../.. && pnpm install && pnpm build --filter=@myvote/ussd
    run_command: cd apps/ussd && npm start
    environment_slug: node-js
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3001
    routes:
      - path: /ussd
    envs:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        type: SECRET
    health_check:
      http_path: /health

