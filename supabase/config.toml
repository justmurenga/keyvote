# myVote Kenya - Supabase Configuration
# A minimal config file for `supabase init`.

project_id = "my_vote"

[api]
enabled = true
port = 54421
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54422
shadow_port = 54420
major_version = 17

[studio]
enabled = true
port = 54423
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54424
smtp_port = 54425
pop3_port = 54426

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000", "https://myvote.ke", "http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = true
enable_confirmations = true
template = "Your myVote Kenya verification code is {{ .Code }}"
max_frequency = "30s"

[auth.external.google]
enabled = false

[auth.external.apple]
enabled = false

[realtime]
enabled = true
ip_version = "IPv4"

[analytics]
enabled = false
